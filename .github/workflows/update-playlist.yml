name: Auto-Update Master Playlist

on:
  schedule:
    # Runs every 30 minutes (Adjust as needed!)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows you to run this manually anytime from the Actions tab

permissions:
  contents: write # Crucial: Allows the runner to commit changes back to your repository

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Stream Checker
        run: node index.mjs

      - name: Commit and Push if Master Playlist has updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add master.m3u
          if git diff --staged --quiet; then
            echo "No changes found. Master playlist is up to date."
          else
            git commit -m "Auto-update: Regenerated master playlist with live channels [skip ci]"
            git push
          fi